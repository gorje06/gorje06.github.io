<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="gorje — Red Team · Pentesting · Writeups">
  <title>gorje</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #fce8ef;
      --bg-2: #f0b8c8;
      --bg-3: #e07890;
      --bg-4: #d24d62;
      --card: #2b2d31;
      --card-inner: #313338;
      --banner: #3d5c3a;
      --text: #f2f3f5;
      --muted: #b5bac1;
      --accent: #ed4245;
      --accent-soft: rgba(237, 66, 69, 0.15);
      --green: #23a559;
      --pink: #eb459e;
      --purple: #5865f2;
      --btn: #383a40;
      --btn-hover: #404249;
      --cyan: #00d4ff;
      --cyan-glow: rgba(0, 212, 255, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background:
        radial-gradient(ellipse 130% 90% at 50% -10%, #fff5f8 0%, transparent 55%),
        radial-gradient(ellipse 90% 70% at 85% 95%, rgba(210, 77, 98, 0.45) 0%, transparent 50%),
        radial-gradient(ellipse 70% 50% at 10% 80%, rgba(240, 160, 180, 0.35) 0%, transparent 45%),
        linear-gradient(175deg, var(--bg-1) 0%, var(--bg-2) 38%, var(--bg-3) 72%, var(--bg-4) 100%);
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    .bg-shimmer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 25% 15%, rgba(255, 220, 230, 0.55) 0%, transparent 42%),
        radial-gradient(circle at 75% 85%, rgba(200, 70, 95, 0.35) 0%, transparent 40%);
      animation: bgShimmer 10s ease-in-out infinite alternate;
    }

    @keyframes bgShimmer {
      0% { opacity: 0.65; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.04); }
    }

    .cyber-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255, 180, 200, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 180, 200, 0.08) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    }

    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    .scene {
      position: relative;
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: center;
    }

    .float-gifs {
      position: absolute;
      inset: -160px -130px;
      pointer-events: none;
      z-index: 2;
    }

    .float-gifs img {
      position: absolute;
      border-radius: 16px;
      object-fit: cover;
      filter: drop-shadow(0 6px 16px rgba(80, 40, 60, 0.28));
      opacity: 0.95;
      border: 2px solid rgba(255, 255, 255, 0.35);
    }

    .gif-1 { width: 118px; top: 0%;    left: -12%; animation: bob 4s ease-in-out infinite; }
    .gif-2 { width: 108px; top: 16%;   right: -14%; animation: bob 3.5s ease-in-out infinite 0.5s; border-radius: 50%; }
    .gif-3 { width: 125px; top: 40%;   left: -16%; animation: drift 5s ease-in-out infinite 1s; }
    .gif-4 { width: 100px; top: 52%;   right: -12%; animation: spin-bob 6s ease-in-out infinite; border-radius: 50%; }
    .gif-5 { width: 115px; bottom: 16%; left: -10%; animation: bob 4.2s ease-in-out infinite 0.8s; }
    .gif-6 { width: 105px; bottom: 4%;  right: -10%; animation: drift 4.8s ease-in-out infinite 1.5s; }
    .gif-7 { width: 95px;  top: 6%;    right: 2%;  animation: bob 3.2s ease-in-out infinite 2s; border-radius: 50%; }
    .gif-8 { width: 110px; bottom: 30%; right: -16%; animation: bob 5s ease-in-out infinite 0.3s; }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-14px) rotate(3deg); }
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(6px, -10px) rotate(5deg); }
      66% { transform: translate(-4px, -6px) rotate(-4deg); }
    }

    @keyframes spin-bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(8deg); }
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
      opacity: 0.45;
    }

    body::before {
      width: 320px; height: 320px;
      background: #ffc8d8;
      top: -90px; right: -70px;
    }

    body::after {
      width: 260px; height: 260px;
      background: #e87088;
      bottom: -50px; left: -50px;
    }

    .card {
      position: relative;
      z-index: 3;
      width: 100%;
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid transparent;
      background-clip: padding-box;
      box-shadow:
        0 8px 32px rgba(120, 40, 60, 0.28),
        0 2px 8px rgba(0, 0, 0, 0.12),
        0 0 48px rgba(230, 90, 110, 0.18);
      transition: box-shadow 0.3s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      padding: 2px;
      background: linear-gradient(
        145deg,
        rgba(255, 210, 225, 0.9) 0%,
        rgba(230, 100, 120, 0.85) 45%,
        rgba(200, 60, 85, 0.9) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 30;
      animation: borderGlow 6s ease-in-out infinite alternate;
    }

    @keyframes borderGlow {
      0% { opacity: 0.75; filter: brightness(1); }
      100% { opacity: 1; filter: brightness(1.15); }
    }

    .card:hover {
      box-shadow:
        0 12px 40px rgba(120, 40, 60, 0.35),
        0 0 60px rgba(230, 90, 110, 0.28);
    }

    .online-bar {
      position: relative;
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.65rem 1rem;
      background: rgba(30, 31, 34, 0.92);
      border-bottom: 1px solid #3f4147;
      cursor: default;
    }

    .online-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(35, 165, 89, 0.6);
      flex-shrink: 0;
    }

    .online-label {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .online-chevron {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
    }


    .banner {
      height: 110px;
      background:
        linear-gradient(135deg, rgba(35, 165, 89, 0.85) 0%, rgba(61, 92, 58, 0.95) 100%),
        url('img/banner.jpg') center / cover no-repeat;
    }

    .profile-top {
      padding: 0 1.25rem;
      margin-top: -42px;
      position: relative;
    }

    .avatar-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
      width: 136px;
      height: 136px;
    }

    .avatar-deco {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 136px;
      height: 136px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
      object-fit: contain;
    }

    .avatar {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 6px solid var(--card);
      object-fit: cover;
      background: var(--card-inner);
      display: block;
    }

    .loaf-layer {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 58%;
      max-width: 250px;
      pointer-events: none;
      z-index: 20;
      line-height: 0;
    }

    .loaf-burst {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transform: translateY(12px) scale(0.92);
      animation: loafPop 2.8s ease forwards;
    }

    @keyframes loafPop {
      0% { opacity: 0; transform: translateY(16px) scale(0.88); }
      12% { opacity: 1; transform: translateY(0) scale(1); }
      75% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(0.96); }
    }

    .card-content {
      position: relative;
      z-index: 4;
    }

    .status-dot {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 18px;
      height: 18px;
      background: var(--green);
      border: 4px solid var(--card);
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 6px rgba(35, 165, 89, 0.55);
    }

    .status-bubble {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--card-inner);
      padding: 0.4rem 0.7rem;
      border-radius: 12px;
      max-width: 160px;
      line-height: 1.3;
    }

    .identity {
      padding: 0 0.25rem 0.5rem;
    }

    .username {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .handle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.65rem;
    }

    .badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.28rem 0.55rem;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .badge-red {
      background: var(--accent);
      color: #fff;
    }

    .bio-block {
      margin: 0.75rem 1.25rem 0;
      padding: 0.85rem 0 0;
    }

    .bio {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.45;
    }

    .member-since {
      margin-top: 0.5rem;
      line-height: 1.35;
    }

    .member-since-label {
      display: block;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .member-since-date {
      display: block;
      font-size: 0.82rem;
      color: var(--text);
      margin-top: 0.1rem;
    }

    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      padding: 1rem 1.25rem 1.25rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.7rem 0.8rem;
      background: var(--btn);
      border: none;
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: background 0.15s, transform 0.15s;
    }

    .link-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 0 14px var(--cyan-glow);
      color: #fff;
    }

    .link-btn svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
      fill: var(--muted);
      transition: fill 0.15s;
    }

    .link-btn:hover svg { fill: var(--text); }

    .link-btn.htb:hover svg { fill: var(--accent); }
    .link-btn.github:hover svg { fill: #fff; }
    .link-btn.spotify:hover svg { fill: #1db954; }
    .link-btn.discord:hover svg { fill: var(--purple); }

    @media (max-width: 520px) {
      .float-gifs { inset: -100px -50px; }
      .gif-3, .gif-5, .gif-8 { display: none; }
      .gif-1, .gif-2, .gif-4, .gif-6, .gif-7 { width: 82px; }
    }

    @media (max-width: 380px) {
      .links { grid-template-columns: 1fr; }
      .status-bubble { display: none; }
      .gif-4, .gif-7 { display: none; }
    }

    .chat-fab {
      position: fixed;
      bottom: 1.25rem;
      right: 1.25rem;
      z-index: 50;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 999px;
      background: var(--purple);
      color: #fff;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(88, 101, 242, 0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .chat-fab:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(88, 101, 242, 0.6);
    }

    .chat-panel {
      position: fixed;
      bottom: 4.5rem;
      right: 1.25rem;
      z-index: 50;
      width: min(340px, calc(100vw - 2rem));
      max-height: 420px;
      background: var(--card);
      border: 1px solid rgba(88, 101, 242, 0.35);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px) scale(0.96);
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
    }

    .chat-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem;
      background: var(--card-inner);
      border-bottom: 1px solid #3f4147;
    }

    .chat-header img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .chat-header-info strong {
      display: block;
      font-size: 0.88rem;
    }

    .chat-header-info span {
      font-size: 0.68rem;
      color: var(--green);
    }

    .chat-close {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      min-height: 180px;
      max-height: 240px;
    }

    .chat-msg {
      max-width: 88%;
      padding: 0.55rem 0.75rem;
      border-radius: 12px;
      font-size: 0.8rem;
      line-height: 1.4;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-msg.bot {
      align-self: flex-start;
      background: var(--btn);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: var(--purple);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-msg.typing {
      color: var(--muted);
      font-style: italic;
      font-size: 0.72rem;
      background: transparent;
      padding: 0.25rem 0.5rem;
    }

    .chat-options {
      padding: 0.65rem 0.85rem 0.85rem;
      border-top: 1px solid #3f4147;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .chat-opt {
      padding: 0.55rem 0.7rem;
      background: var(--btn);
      border: 1px solid #4e5058;
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.75rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .chat-opt:hover {
      background: var(--btn-hover);
      border-color: var(--purple);
    }

    .chat-disclaimer {
      font-size: 0.58rem;
      color: var(--muted);
      text-align: center;
      padding: 0 0.5rem 0.5rem;
    }
  </style>
</head>

    // Lazy Loaf: burst sobre los botones (1x por gif y por evento)
    (function initLoafBursts() {
      var layer = document.getElementById('loaf-layer');
      if (!layer) return;

      var busy = false;

      window.spawnLoafBurst = function() {
        if (busy) return;
        busy = true;
        var img = document.createElement('img');
        img.className = 'loaf-burst';
        img.src = 'img/lazy-loaf-loop.png?' + Date.now();
        img.alt = '';
        layer.appendChild(img);
        setTimeout(function() {
          img.remove();
          busy = false;
        }, 2800);
      };
    })();

    // Chat de broma (menu interactivo)
    (function initJokeChat() {
      const fab = document.getElementById('chat-fab');
      const panel = document.getElementById('chat-panel');
      const closeBtn = document.getElementById('chat-close');
      const msgs = document.getElementById('chat-messages');
      const opts = document.getElementById('chat-options');
      if (!fab || !panel || !closeBtn || !msgs || !opts) return;

      function setOpen(open) {
        panel.classList.toggle('open', open);
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (open && msgs.childElementCount === 0) boot();
      }

      function scrollBottom() {
        msgs.scrollTop = msgs.scrollHeight;
      }

      function addMsg(text, who) {
        const div = document.createElement('div');
        div.className = `chat-msg ${who}`;
        div.textContent = text;
        msgs.appendChild(div);
        scrollBottom();
        return div;
      }

      function typing(ms = 650) {
        const t = addMsg('escribiendo…', 'typing');
        return new Promise(res => setTimeout(() => { t.remove(); res(); }, ms));
      }

      function setOptions(list) {
        opts.innerHTML = '';
        list.forEach(o => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'chat-opt';
          b.textContent = o.label;
          b.addEventListener('click', (e) => {
            e.stopPropagation();
            o.onClick();
          });
          opts.appendChild(b);
        });
      }

      const flows = {
        root() {
          setOptions([
            { label: 'cuenta un chiste malo', onClick: () => run('joke') },
            { label: 'qué haces (en 1 línea)', onClick: () => run('about') },
            { label: 'dame tus writeups', onClick: () => run('writeups') },
            { label: 'cómo te contacto de verdad', onClick: () => run('contact') },
            { label: 'insúltame suave', onClick: () => run('roast') },
          ]);
        },
        async joke() {
          addMsg('cuenta un chiste malo', 'user');
          await typing();
          addMsg('¿Qué hace un pentester en la playa?… “SAND-boxing”.', 'bot');
          await typing(500);
          addMsg('ya, perdón. siguiente pregunta.', 'bot');
          flows.root();
        },
        async about() {
          addMsg('qué haces (en 1 línea)', 'user');
          await typing();
          addMsg('Red Team en modo “aprendizaje” + writeups + CTFs.', 'bot');
          flows.root();
        },
        async writeups() {
          addMsg('dame tus writeups', 'user');
          await typing();
          addMsg('toma: GitHub → Stars → Writeups (ahí están ordenados).', 'bot');
          flows.root();
        },
        async contact() {
          addMsg('cómo te contacto de verdad', 'user');
          await typing();
          addMsg('LinkedIn o Discord (botón de la página). Si no respondo, estoy durmiendo 😴', 'bot');
          flows.root();
        },
        async roast() {
          addMsg('insúltame suave', 'user');
          await typing();
          addMsg('mano, tú no eres “lazy loaf”… eres “speedrun de procrastinar” 😭', 'bot');
          flows.root();
        }
      };

      async function run(key) {
        if (!flows[key]) return;
        opts.innerHTML = '';
        await flows[key]();
      }

      function boot() {
        addMsg('ey. soy gorje pero en versión descatalogada.', 'bot');
        addMsg('elige algo 👇 (el chat no se cierra solo, prometo)', 'bot');
        flows.root();
      }

      fab.addEventListener('click', (e) => {
        e.stopPropagation();
        setOpen(!panel.classList.contains('open'));
      });
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        setOpen(false);
      });
      panel.addEventListener('click', (e) => e.stopPropagation());
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') setOpen(false);
      });
      document.addEventListener('mousedown', (e) => {
        if (!panel.classList.contains('open')) return;
        const t = e.target;
        if (t === fab || panel.contains(t)) return;
        setOpen(false);
      });
    })();

    // Partículas flotantes (inspirado en hackl4bs.com)
    (function initParticles() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let w, h, dots;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        const count = Math.min(55, Math.floor(w * h / 18000));
        dots = Array.from({ length: count }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          r: Math.random() * 1.8 + 0.4,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          c: Math.random() > 0.5 ? 'rgba(255,180,200,' : 'rgba(230,90,110,',
          a: Math.random() * 0.35 + 0.15
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        dots.forEach(d => {
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < 0 || d.x > w) d.vx *= -1;
          if (d.y < 0 || d.y > h) d.vy *= -1;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = d.c + d.a + ')';
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }

      resize();
      window.addEventListener('resize', resize);
      draw();
    })();

    // Fisica + drag para los GIFs
    (function initGifPhysics() {
      var container = document.querySelector('.float-gifs');
      if (!container) return;
      var imgs = Array.from(container.querySelectorAll('img'));
      if (!imgs.length) return;

      container.style.pointerEvents = 'auto';
      container.style.position = 'absolute';

      var W = container.offsetWidth  || window.innerWidth;
      var H = container.offsetHeight || window.innerHeight;

      function triggerLoaf(o, kind) {
        if (!o.loaf || o.loaf[kind]) return;
        o.loaf[kind] = true;
        if (typeof window.spawnLoafBurst === 'function') window.spawnLoafBurst();
      }

      function containerOffset() {
        var rect = container.getBoundingClientRect();
        return { left: rect.left, top: rect.top };
      }

      var state = imgs.map(function(img) {
        img.style.animation = 'none';
        img.style.cursor    = 'grab';
        img.style.userSelect = 'none';
        img.style.position  = 'absolute';
        var r = (img.offsetWidth || 110) / 2;
        var x = Math.random() * (W - 2 * r) + r;
        var y = Math.random() * (H - 2 * r) + r;
        img.style.left = (x - r) + 'px';
        img.style.top  = (y - r) + 'px';
        img.style.right = '';
        img.style.bottom = '';
        return {
          img: img, x: x, y: y, r: r,
          vx: (Math.random() - 0.5) * 1.2,
          vy: (Math.random() - 0.5) * 1.2,
          dragging: false, broken: false, angle: 0, spin: 0,
          loaf: { hover: false, grab: false, fall: false },
          wasDragging: false, lastVy: 0
        };
      });

      var last = performance.now();

      function step(now) {
        var dt = Math.min(32, now - last) / 16;
        last = now;
        W = container.offsetWidth  || window.innerWidth;
        H = container.offsetHeight || window.innerHeight;

        state.forEach(function(o) {
          if (o.dragging) return;
          o.x += o.vx * dt;
          o.y += o.vy * dt;
          o.angle += o.spin * dt;

          if (o.x - o.r < 0)  { o.x = o.r;     o.vx = Math.abs(o.vx); shake(o); }
          if (o.x + o.r > W)  { o.x = W - o.r;  o.vx = -Math.abs(o.vx); shake(o); }
          if (o.y - o.r < 0)  { o.y = o.r;     o.vy = Math.abs(o.vy); shake(o); }
          if (o.y + o.r > H)  {
            if (o.lastVy > 1.2) triggerLoaf(o, 'fall');
            o.y = H - o.r;
            o.vy = -Math.abs(o.vy) * 0.72;
            shake(o);
          }
          o.lastVy = o.vy;
        });

        // colisiones
        for (var i = 0; i < state.length; i++) {
          for (var j = i + 1; j < state.length; j++) {
            var a = state[i], b = state[j];
            var dx = b.x - a.x, dy = b.y - a.y;
            var d2 = dx * dx + dy * dy;
            var min = a.r + b.r;
            if (d2 > 0 && d2 < min * min) {
              var d  = Math.sqrt(d2) || 1;
              var nx = dx / d, ny = dy / d;
              var ov = 0.5 * (min - d + 1);
              a.x -= nx * ov; a.y -= ny * ov;
              b.x += nx * ov; b.y += ny * ov;
              var tx = a.vx, ty = a.vy;
              a.vx = b.vx; a.vy = b.vy;
              b.vx = tx;   b.vy = ty;
              var speed = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
              if (speed > 2.5) { breakEffect(a); breakEffect(b); }
              a.spin = (Math.random() - 0.5) * 4;
              b.spin = (Math.random() - 0.5) * 4;
            }
          }
        }

        state.forEach(function(o) {
          o.img.style.left = (o.x - o.r) + 'px';
          o.img.style.top  = (o.y - o.r) + 'px';
          o.img.style.transform = 'rotate(' + o.angle + 'deg)' + (o.broken ? ' scale(0.92)' : '');
          o.spin *= 0.96;
        });

        requestAnimationFrame(step);
      }

      requestAnimationFrame(step);

      function shake(o) {
        o.spin = (Math.random() - 0.5) * 3;
      }

      function breakEffect(o) {
        if (o.broken) return;
        o.broken = true;
        o.img.style.filter = 'drop-shadow(0 6px 16px rgba(80,40,60,.28)) brightness(1.5)';
        o.img.style.border = '3px solid rgba(255,100,100,0.9)';
        setTimeout(function() {
          o.broken = false;
          o.img.style.filter = 'drop-shadow(0 6px 16px rgba(80,40,60,.28))';
          o.img.style.border = '2px solid rgba(255,255,255,0.35)';
        }, 400);
      }

      var drag = null, ox = 0, oy = 0, lx = 0, ly = 0;

      imgs.forEach(function(img, idx) {
        img.addEventListener('mouseenter', function() {
          triggerLoaf(state[idx], 'hover');
        });
        img.addEventListener('mousedown', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var off = containerOffset();
          drag = state[idx];
          drag.dragging = true;
          drag.wasDragging = true;
          triggerLoaf(drag, 'grab');
          drag.img.style.cursor = 'grabbing';
          drag.img.style.zIndex = 999;
          ox = e.clientX - off.left - drag.x;
          oy = e.clientY - off.top - drag.y;
          lx = e.clientX;
          ly = e.clientY;
        });
        img.addEventListener('touchstart', function(e) {
          var t = e.touches[0];
          var off = containerOffset();
          drag = state[idx];
          drag.dragging = true;
          drag.wasDragging = true;
          triggerLoaf(drag, 'grab');
          drag.img.style.zIndex = 999;
          ox = t.clientX - off.left - drag.x;
          oy = t.clientY - off.top - drag.y;
          lx = t.clientX;
          ly = t.clientY;
        }, { passive: true });
      });

      window.addEventListener('mousemove', function(e) {
        if (!drag) return;
        var off = containerOffset();
        drag.vx = (e.clientX - lx) * 0.18;
        drag.vy = (e.clientY - ly) * 0.18;
        drag.x = e.clientX - off.left - ox;
        drag.y = e.clientY - off.top - oy;
        lx = e.clientX; ly = e.clientY;
      });

      window.addEventListener('touchmove', function(e) {
        if (!drag) return;
        var t = e.touches[0];
        var off = containerOffset();
        drag.vx = (t.clientX - lx) * 0.18;
        drag.vy = (t.clientY - ly) * 0.18;
        drag.x = t.clientX - off.left - ox;
        drag.y = t.clientY - off.top - oy;
        lx = t.clientX; ly = t.clientY;
      }, { passive: true });

      function stopDrag() {
        if (!drag) return;
        var speed = Math.sqrt(drag.vx * drag.vx + drag.vy * drag.vy);
        if (drag.wasDragging && speed > 2) triggerLoaf(drag, 'fall');
        drag.img.style.cursor = 'grab';
        drag.img.style.zIndex = '';
        drag.dragging = false;
        drag.wasDragging = false;
        drag = null;
      }
      window.addEventListener('mouseup', stopDrag);
      window.addEventListener('touchend', stopDrag);
    })();

  </script>
